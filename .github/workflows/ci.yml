name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches:
      - dev
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install '.[dev]'

      - name: Linting (ruff)
        run: ruff check .

      - name: Unit-Tests mit Coverage ausführen
        run: pytest -m unit --cov=src --cov-report=xml --cov-fail-under=80 -v --tb=short --log-cli-level=WARNING

      - name: Coverage-Report als Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Integration-Tests ausführen
        run: pytest -m integration -v --tb=long --log-cli-level=WARNING

  apply:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Apply
        run: echo "Apply step ausgeführt auf ${GITHUB_REF}"